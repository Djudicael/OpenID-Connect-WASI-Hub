# =============================================================================
# OWASP ZAP Baseline Configuration — OIDC Hub
# =============================================================================
#
# This file controls alert thresholds and false-positive exceptions for the
# ZAP baseline scan. Lines starting with # are comments.
#
# Format:
#   <rule-id> IGNORE|WARN|FAIL <description>
#
# Thresholds:
#   IGNORE — Suppress the alert entirely (use for confirmed false positives)
#   WARN   — Report but do not fail the build (informational)
#   FAIL   — Fail the build if this alert is triggered (default for HIGH/CRITICAL)
#
# Rule IDs reference: https://www.zaproxy.org/docs/alerts/
# =============================================================================

# =============================================================================
# OIDC Hub Context — Endpoint Patterns
# =============================================================================
# These are set programmatically via -z flag in zap-baseline.sh.
# The context includes all OIDC endpoints under the target URL.

# =============================================================================
# False Positive Exceptions — Localhost / Development
# =============================================================================
# These alerts are expected in local/dev environments and should not fail CI
# when running against localhost. In production scans, remove these exceptions.

# Cookie without Secure flag — expected on localhost (no TLS)
10038 IGNORE (Cookie No HttpOnly Flag) - Session cookies use HttpOnly; non-session cookies may not need it on localhost
10040 IGNORE (Cookie Without Secure Flag) - Expected on localhost without TLS; Secure flag set in production

# Mixed content — not applicable on localhost
10037 IGNORE (Content-Type Missing) - OIDC API responses may omit Content-Type on error responses

# =============================================================================
# Informational — WARN but not FAIL
# =============================================================================
# These are worth reviewing but should not block the build.

# Application errors disclosed — OIDC spec requires error responses
10056 WARN (Server Leaks Information via X-AspNet-Version Response Header)
10057 WARN (Server Leaks Information via X-Powered-By Response Header)

# Insecure JS/CSS — may be present in dev builds
10027 WARN (Insecure JS/CSS Reference)

# =============================================================================
# Security Headers — FAIL
# =============================================================================
# These MUST be present and correct. Missing security headers are a real issue.

# X-Frame-Options
10020 FAIL (X-Frame-Options Header Not Set)

# X-Content-Type-Options
10021 FAIL (X-Content-Type-Options Header Missing)

# Strict-Transport-Security (HSTS)
10035 FAIL (Strict-Transport-Security Header Not Set)

# CSP
10038 WARN (Content Security Policy (CSP) Header Not Set) - CSP is complex for OIDC; review manually

# =============================================================================
# Authentication & Session Management — FAIL
# =============================================================================

# Weak authentication
10105 FAIL (Weak Authentication Method Detected)

# Session fixation
10108 FAIL (Session Fixation)

# =============================================================================
# Injection & XSS — FAIL (even in baseline, passive detection)
# =============================================================================

# Cross-Domain JavaScript Source File Inclusion
10096 WARN (Cross-Domain JavaScript Source File Inclusion)

# =============================================================================
# TLS / Crypto — FAIL
# =============================================================================

# Weak cipher suites
10098 FAIL (Weak Cipher Suite)

# =============================================================================
# OIDC-Specific Checks
# =============================================================================
# These are custom checks relevant to OIDC deployments.

# Information disclosure in error messages — OIDC spec requires some error info
10055 WARN (CSP: Wildcard Directive) - Review CSP directives manually

# =============================================================================
# Default: FAIL for any HIGH/CRITICAL not explicitly listed above
# =============================================================================
# Any alert not matched by a rule above will use ZAP's default threshold,
# which is FAIL for HIGH and CRITICAL severity.
