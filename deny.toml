# cargo-deny configuration for OpenID Connect WASI Hub
# https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "The workspace still depends on the rsa crate for RS256/JWE flows, and RustSec currently offers no patched release. Keep auditing this until the dependency can be replaced or upstream ships a fix." },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
    "ISC",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = [
    { crate = "ring", allow = ["ISC", "OpenSSL"] },
    { crate = "rustls-webpki", allow = ["ISC"] },
]

[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[bans.workspace-dependencies]
unused = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
