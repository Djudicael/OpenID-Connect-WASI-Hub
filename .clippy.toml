# Clippy configuration for OpenID Connect WASI Hub
# https://doc.rust-lang.org/clippy/configuration.html

# Cognitive complexity threshold — WASI-constrained code should stay readable
cognitive-complexity-threshold = 30

# Type complexity — limit generic / type alias complexity
type-complexity-threshold = 300

# Maximum number of lines in a function body
too-many-lines-threshold = 150

# Maximum number of arguments in a function
too-many-arguments-threshold = 8

# Maximum struct size (in bytes) before clippy warns about large types passed by value
trivially-copy-pass-by-macros = []

# Disallow large types passed by value (threshold in bytes)
large-types-passed-by-value = ["OidcProvider", "ClientRegistration", "AuthorizationCode"]

# Single-character binding names are fine in short scopes (closures, iterators)
# but we keep the default to catch accidental misuse
single-char-binding-names-threshold = 2
